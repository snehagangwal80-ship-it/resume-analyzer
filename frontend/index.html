<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body
    class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-6xl mx-auto px-4">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
        <!-- Left Side - Branding -->
        <div class="text-center space-y-5">
          <h1 class="text-4xl lg:text-6xl font-bold text-black leading-normal">
            AI-Powered Resume Analyzer
          </h1>
          <p class="text-md lg:text-lg text-gray-700">
            Smartly optimize your resume for Applicant Tracking Systems (ATS)
            and tailored job descriptions.
          </p>
        </div>

        <!-- Right Side - Login Form -->
        <div
          class="bg-white rounded-2xl shadow-2xl p-6 max-w-md mx-auto w-full">
          <div class="flex border-b-2 border-gray-300 mb-5">
            <button
              type="button"
              id="login-tab"
              class="flex-1 py-2 px-3 font-semibold text-indigo-600 border-b-4 border-indigo-600 transition duration-300 text-sm">
              Login
            </button>
            <button
              type="button"
              id="signup-tab"
              class="flex-1 py-2 px-3 font-semibold text-gray-600 hover:text-gray-800 transition duration-300 text-sm">
              Sign Up
            </button>
          </div>

          <!-- Login Form -->
          <form id="login-form" class="space-y-3">
            <div>
              <label
                class="block text-gray-700 font-semibold mb-1 text-xs"
                for="login-username"
                >Username</label
              >
              <input
                type="text"
                id="login-username"
                class="w-full px-3 py-1.5 text-sm border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
                placeholder="Great"
                required />
            </div>
            <div>
              <label
                class="block text-gray-700 font-semibold mb-1 text-xs"
                for="login-password"
                >Password</label
              >
              <div class="relative">
                <input
                  type="password"
                  id="login-password"
                  class="w-full px-3 py-1.5 text-sm border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition pr-8"
                  placeholder="password"
                  required />
                <button
                  type="button"
                  id="toggle-login-pwd"
                  class="absolute right-2 top-2 text-gray-500 hover:text-gray-700">
                  <i class="fas fa-eye text-sm"></i>
                </button>
              </div>
            </div>
            <button
              type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition duration-300 shadow-md text-sm">
              Login
            </button>
            <div class="text-center">
              <button
                type="button"
                id="forgot-pwd-btn"
                class="text-indigo-600 hover:text-indigo-800 font-semibold text-xs transition">
                Forgot Password?
              </button>
            </div>
          </form>

          <!-- Signup Form -->
          <form id="signup-form" class="space-y-3 hidden">
            <div>
              <label
                class="block text-gray-700 font-semibold mb-1 text-xs"
                for="signup-username"
                >Username</label
              >
              <input
                type="text"
                id="signup-username"
                class="w-full px-3 py-1.5 text-sm border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
                placeholder="Choose a username"
                required />
            </div>
            <div>
              <label
                class="block text-gray-700 font-semibold mb-1 text-xs"
                for="signup-gmail"
                >Gmail</label
              >
              <input
                type="email"
                id="signup-gmail"
                class="w-full px-3 py-1.5 text-sm border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
                placeholder="your@gmail.com"
                required />
            </div>
            <div>
              <label
                class="block text-gray-700 font-semibold mb-1 text-xs"
                for="signup-password"
                >Password</label
              >
              <div class="relative">
                <input
                  type="password"
                  id="signup-password"
                  class="w-full px-3 py-1.5 text-sm border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition pr-8"
                  placeholder="••••••••"
                  required />
                <button
                  type="button"
                  id="toggle-signup-pwd"
                  class="absolute right-2 top-2 text-gray-500 hover:text-gray-700">
                  <i class="fas fa-eye text-sm"></i>
                </button>
              </div>
            </div>
            <div>
              <label
                class="block text-gray-700 font-semibold mb-1 text-xs"
                for="signup-confirm-password"
                >Confirm Password</label
              >
              <div class="relative">
                <input
                  type="password"
                  id="signup-confirm-password"
                  class="w-full px-3 py-1.5 text-sm border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition pr-8"
                  placeholder="••••••••"
                  required />
                <button
                  type="button"
                  id="toggle-signup-confirm-pwd"
                  class="absolute right-2 top-2 text-gray-500 hover:text-gray-700">
                  <i class="fas fa-eye text-sm"></i>
                </button>
              </div>
            </div>
            <button
              type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition duration-300 shadow-md text-sm">
              Sign Up
            </button>
          </form>

          <!-- Password Reset Form (Hidden by default) -->
          <form id="reset-form" class="space-y-3 hidden">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Reset Password</h2>
            <div>
              <label
                class="block text-gray-700 font-semibold mb-1 text-xs"
                for="reset-email"
                >Email</label
              >
              <input
                type="email"
                id="reset-email"
                class="w-full px-3 py-1.5 text-sm border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
                placeholder="your@gmail.com"
                required />
            </div>
            <div>
              <label
                class="block text-gray-700 font-semibold mb-1 text-xs"
                for="reset-new-password"
                >New Password</label
              >
              <div class="relative">
                <input
                  type="password"
                  id="reset-new-password"
                  class="w-full px-3 py-1.5 text-sm border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition pr-8"
                  placeholder="••••••••"
                  required />
                <button
                  type="button"
                  id="toggle-reset-pwd"
                  class="absolute right-2 top-2 text-gray-500 hover:text-gray-700">
                  <i class="fas fa-eye text-sm"></i>
                </button>
              </div>
            </div>
            <div>
              <label
                class="block text-gray-700 font-semibold mb-1 text-xs"
                for="reset-confirm-password"
                >Confirm Password</label
              >
              <div class="relative">
                <input
                  type="password"
                  id="reset-confirm-password"
                  class="w-full px-3 py-1.5 text-sm border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition pr-8"
                  placeholder="••••••••"
                  required />
                <button
                  type="button"
                  id="toggle-reset-confirm-pwd"
                  class="absolute right-2 top-2 text-gray-500 hover:text-gray-700">
                  <i class="fas fa-eye text-sm"></i>
                </button>
              </div>
            </div>
            <button
              type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition duration-300 shadow-md text-sm">
              Update Password
            </button>
            <button
              type="button"
              id="back-to-login-btn"
              class="w-full bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-lg transition duration-300 text-sm">
              Back to Login
            </button>
          </form>

          <!-- Footer -->
          <div class="mt-4 text-center text-xs text-gray-600 border-t pt-3">
            <p>
              © <span id="year"></span> AI-Powered Resume Analyzer by Sneha
              Gangwal. All rights reserved.
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
